<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-down Shooter Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20; left: 20;
            color: white; font-size: 24px; pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

// 遊戲狀態
let score = 0;
let isGameOver = false;

// 設定畫布大小
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 遊戲物件 ---
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 20,
    angle: 0,
    speed: 5,
    color: '#00ffcc'
};

let bullets = [];
let enemies = [];
const keys = {};

// --- 輸入監聽 ---
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

window.addEventListener('mousemove', e => {
    const dx = e.clientX - player.x;
    const dy = e.clientY - player.y;
    player.angle = Math.atan2(dy, dx);
});

window.addEventListener('mousedown', () => {
    if(isGameOver) return;
    bullets.push({
        x: player.x,
        y: player.y,
        vx: Math.cos(player.angle) * 12,
        vy: Math.sin(player.angle) * 12
    });
});

// --- 核心邏輯 ---
function spawnEnemy() {
    if(isGameOver) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = Math.random() * canvas.width; y = -30; }
    else if (side === 1) { x = Math.random() * canvas.width; y = canvas.height + 30; }
    else if (side === 2) { x = -30; y = Math.random() * canvas.height; }
    else { x = canvas.width + 30; y = Math.random() * canvas.height; }

    enemies.push({ x, y, size: 25, speed: 2 + Math.random() });
}

// 每 1000 毫秒 (1秒) 生成一個敵人
setInterval(spawnEnemy, 1000);

function update() {
    if (isGameOver) return;

    // 1. 玩家移動
    if (keys['w'] || keys['arrowup']) player.y -= player.speed;
    if (keys['s'] || keys['arrowdown']) player.y += player.speed;
    if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
    if (keys['d'] || keys['arrowright']) player.x += player.speed;

    // 2. 更新子彈
    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        // 移除超出螢幕的子彈
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(index, 1);
        }
    });

    // 3. 更新敵人與碰撞判定
    enemies.forEach((enemy, eIndex) => {
        // 敵人朝玩家前進
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.hypot(dx, dy);
        enemy.x += (dx / dist) * enemy.speed;
        enemy.y += (dy / dist) * enemy.speed;

        // 判定：敵人撞到玩家
        if (dist < player.size + enemy.size / 2) {
            isGameOver = true;
            alert(`遊戲結束！你的得分是: ${score}`);
            location.reload();
        }

        // 判定：子彈打到敵人
        bullets.forEach((bullet, bIndex) => {
            const bdx = bullet.x - enemy.x;
            const bdy = bullet.y - enemy.y;
            const bDist = Math.hypot(bdx, bdy);

            if (bDist < enemy.size) {
                // 擊中效果
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                score += 100;
                scoreElement.innerText = score;
            }
        });
    });
}

function draw() {
    ctx.fillStyle = 'rgba(26, 26, 26, 0.3)'; // 加上殘影效果
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 畫子彈
    ctx.fillStyle = '#ffff00';
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    // 畫敵人
    ctx.fillStyle = '#ff4444';
    enemies.forEach(e => {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillRect(-12.5, -12.5, 25, 25);
        ctx.restore();
    });

    // 畫玩家
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = player.color;
    // 畫一個有質感的三角形小飛船
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(-15, -15);
    ctx.lineTo(-10, 0);
    ctx.lineTo(-15, 15);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
