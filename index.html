<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Cyber-Grid Arena Protype</title>
    <style>
        /* 科技感賽博朋克配色與基礎設定 */
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --dark-bg: #0a0a14;
            --panel-bg: rgba(16, 16, 36, 0.75);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            /* 模擬科技感背景線條 */
            background-image: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 主遊戲容器 (強制橫向體感) */
        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            position: relative;
        }

        /* ==================== 頂部狀態列 ==================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 60px;
        }

        /* 玩家資訊 (左上) */
        .player-info {
            display: flex;
            align-items: center;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-left: 4px solid var(--neon-cyan);
            clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #222;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            margin-right: 10px;
        }
        .uid-display {
            font-size: 12px;
            color: #888;
        }

        /* 系統小按鈕組 (右上) */
        .system-buttons {
            display: flex;
            gap: 15px;
        }
        .btn-small {
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
        }
        .btn-small:hover, .btn-small:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* ==================== 中央角色展示區 ==================== */
        .center-area {
            position: absolute;
            left: 10%;
            top: 25%;
            width: 40%;
            height: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .character-hologram {
            font-size: 24px;
            color: rgba(0, 240, 255, 0.6);
            text-shadow: 0 0 10px var(--neon-cyan);
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        /* ==================== 右側核心玩法區 ==================== */
        .main-menu-buttons {
            position: absolute;
            right: 5%;
            top: 25%;
            width: 35%;
            height: 65%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        /* 通用大按鈕樣式 */
        .btn-large {
            width: 90%;
            background: var(--panel-bg);
            color: #fff;
            border: 2px solid var(--neon-pink);
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: left;
            padding-left: 30px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%);
        }
        .btn-large::after {
            content: attr(data-key);
            position: absolute;
            right: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 線上對戰特大號處理 */
        .btn-battle {
            width: 100%;
            border-color: var(--neon-cyan);
            background: linear-gradient(45deg, rgba(0,240,255,0.2), transparent);
            font-size: 22px;
            box-shadow: inset 0 0 15px rgba(0,240,255,0.2);
        }

        .btn-large:hover, .btn-large:active {
            transform: translateX(-5px);
            box-shadow: -5px 0 15px var(--neon-pink);
            background: var(--neon-pink);
            color: #000;
        }
        .btn-battle:hover, .btn-battle:active {
            box-shadow: -5px 0 15px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        /* ==================== 彈出視窗系統 (Modal) ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111122;
            border: 2px solid var(--neon-cyan);
            padding: 30px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,240,255,0.3);
            position: relative;
        }
        .close-btn {
            position: absolute; right: 15px; top: 10px; cursor: pointer; color: var(--neon-pink);
        }
        input {
            background: #000; border: 1px solid var(--neon-cyan); color: #fff;
            padding: 10px; width: 80%; margin: 15px 0; text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar"></div>
                <div>
                    <div id="player-name">訪客戰士</div>
                    <div class="uid-display" id="player-uid">UID: 未綁定</div>
                </div>
            </div>
            
            <div class="system-buttons">
                <button class="btn-small" onclick="openModal('achievement-modal')" title="快捷鍵: A">🏆 成就 [A]</button>
                <button class="btn-small" onclick="openModal('account-modal')" title="快捷鍵: S">💾 帳號儲存 [S]</button>
            </div>
        </div>

        <div class="center-area">
            <div class="character-hologram">⚡ SHADOW_PROTOTYPE_01 ⚡</div>
            <p style="color: #666; font-size: 14px;">[滑鼠點擊/手機觸控或使用鍵盤操作]</p>
        </div>

        <div class="main-menu-buttons">
            <button class="btn-large" data-key="T" onclick="triggerAction('錦標賽開始！')">⚔️ 錦標賽 (Tournament)</button>
            <button class="btn-large btn-battle" data-key="B" onclick="openModal('battle-modal')">🌐 線上對戰 (Online Battle)</button>
            <button class="btn-large" data-key="P" onclick="triggerAction('進入商店/抽卡系統')">🛒 商店與抽卡 (Shop)</button>
        </div>

    </div>

    <div id="account-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('account-modal')">✖</span>
            <h3>🔐 雲端帳號綁定</h3>
            <p>請設定您的科學編號（帳號）來儲存進度：</p>
            <input type="text" id="account-input" placeholder="輸入自訂玩家名稱">
            <button class="btn-small" onclick="saveAccount()">確認綁定並儲存</button>
        </div>
    </div>

    <div id="battle-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('battle-modal')">✖</span>
            <h3>🌐 線上全息對戰</h3>
            <button class="btn-small" style="width:80%; margin-bottom:10px;" onclick="triggerAction('隨機匹配中...')">隨機配對</button>
            <p>— 或 —</p>
            <input type="text" id="room-input" placeholder="請輸入 4 位數自訂房號">
            <button class="btn-small" onclick="joinRoom()">輸入房號進入</button>
        </div>
    </div>

    <div id="achievement-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('achievement-modal')">✖</span>
            <h3>🏆 戰功成就數據庫</h3>
            <div style="text-align: left; padding: 10px; color: #aaa;">
                <p>🟢 【初出茅廬】 成功登入遊戲 (已達成)</p>
                <p>🔴 【常勝將軍】 錦標賽獲得 10 次勝利 (未達成)</p>
                <p>🔴 【歐皇降臨】 一抽獲得神秘連擊卡 (未達成)</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 模擬本地帳號儲存系統 (使用瀏覽器的 LocalStorage)
        window.onload = function() {
            const savedName = localStorage.getItem("cyber_player_name");
            const savedUID = localStorage.getItem("cyber_player_uid");
            
            if (savedName && savedUID) {
                document.getElementById("player-name").innerText = savedName;
                document.getElementById("player-uid").innerText = "UID: " + savedUID;
            }
        }

        function saveAccount() {
            const nameInput = document.getElementById("account-input").value;
            if (!nameInput.trim()) {
                alert("請輸入有效的名稱！");
                return;
            }
            const randomUID = Math.floor(100000 + Math.random() * 900000); // 隨機生成UID
            
            localStorage.setItem("cyber_player_name", nameInput);
            localStorage.setItem("cyber_player_uid", randomUID);
            
            document.getElementById("player-name").innerText = nameInput;
            document.getElementById("player-uid").innerText = "UID: " + randomUID;
            
            alert("🎉 帳號綁定成功！進度已同步至賽博雲端。");
            closeModal('account-modal');
        }

        // 2. 自訂房號連線模擬
        function joinRoom() {
            const roomNum = document.getElementById("room-input").value;
            if(!roomNum) {
                alert("請輸入房號！");
                return;
            }
            alert(`正在連線至加密房間 [ ${roomNum} ]... 尋找對手中...`);
            closeModal('battle-modal');
        }

        // 3. 通用功能
        function triggerAction(text) {
            alert(`[系統指令]: ${text}`);
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // 4. ⌨️ 雙端操控：鍵盤快捷鍵監聽
        document.addEventListener('keydown', function(event) {
            const key = event.key.toUpperCase();
            
            // 當玩家不在輸入框輸入時才觸發快捷鍵
            if (document.activeElement.tagName !== 'INPUT') {
                if (key === 'T') triggerAction('錦標賽開始！');
                if (key === 'B') openModal('battle-modal');
                if (key === 'P') triggerAction('進入商店/抽卡系統');
                if (key === 'A') openModal('achievement-modal');
                if (key === 'S') openModal('account-modal');
                if (event.key === 'Escape') {
                    // 按 Esc 鍵關閉所有彈窗
                    closeModal('account-modal');
                    closeModal('battle-modal');
                    closeModal('achievement-modal');
                }
            }
        });
    </script>
</body>
</html>
