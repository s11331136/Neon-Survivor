<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor - Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; }
        
        #main-menu { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        #main-menu h1 { font-size: 70px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin-bottom: 40px; }

        #char-select { background: #000; display: none; }
        .char-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .char-card { 
            border: 2px solid #333; padding: 20px; width: 180px; 
            cursor: pointer; transition: 0.3s; border-radius: 15px; background: rgba(255,255,255,0.05);
        }
        .char-card:hover, .char-card.active { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; transform: translateY(-5px); }
        
        /* 選卡畫面樣式 */
        #upgrade-screen { background: rgba(0, 0, 0, 0.9); display: none; }
        .card-container { display: flex; gap: 15px; }
        .upgrade-card { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 2px solid #ffcc00; padding: 25px; width: 220px;
            border-radius: 15px; cursor: pointer; transition: 0.2s;
        }
        .upgrade-card:hover { transform: scale(1.05); box-shadow: 0 0 20px #ffcc00; }
        .upgrade-card h3 { color: #ffcc00; margin-top: 0; }

        #game-over-screen { background: rgba(0,0,0,0.9); display: none; }

        .btn { padding: 12px 40px; font-size: 20px; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ffcc; color: #000; }
        
        #game-ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; pointer-events: none; display: none; text-align: left; }
        .bar-container { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid white; margin: 5px 0 15px 0; }
        #hp-bar { width: 100%; height: 100%; background: #ff4444; transition: 0.2s; }
        #energy-bar { width: 0%; height: 100%; background: #00ffcc; }
        
        #boss-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; width: 50%; }
        #boss-bar-box { width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff0055; }
        #boss-bar { width: 100%; height: 100%; background: #ff0055; transition: width 0.3s; }
        #status-msg { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); color: #ffcc00; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #ffcc00; display: none; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>NEON SURVIVOR</h1>
        <button class="btn" onclick="toCharSelect()">START GAME</button>
    </div>

    <div id="char-select" class="overlay">
        <h2>SELECT YOUR HERO</h2>
        <div class="char-container">
            <div class="char-card" id="card-knight" onclick="selectChar('knight')"><h3>⚔️ Knight</h3><p>Balanced Stats</p></div>
            <div class="char-card" id="card-scout" onclick="selectChar('scout')"><h3>⚡ Scout</h3><p>Fast & Fragile</p></div>
            <div class="char-card" id="card-fortress" onclick="selectChar('fortress')"><h3>🛡️ Fortress</h3><p>High Defense</p></div>
        </div>
        <button class="btn" id="confirm-btn" disabled onclick="startGame()">CONFIRM & ENTER</button>
    </div>

    <div id="upgrade-screen" class="overlay">
        <h2 style="color: #ffcc00; font-size: 35px; margin-bottom: 30px;">LEVEL UP! CHOOSE A MOD</h2>
        <div class="card-container" id="card-options"></div>
    </div>

    <div id="game-over-screen" class="overlay">
        <h2 style="color: #ff4444; font-size: 50px;">SYSTEM CRITICAL</h2>
        <div style="font-size:30px; margin-bottom:30px;">Final Score: <span id="final-score-val">0</span></div>
        <button class="btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>

    <div id="status-msg">MAGNET ACTIVE!</div>

    <div id="game-ui">
        Score: <span id="score">0</span><br>
        HP <div class="bar-container"><div id="hp-bar"></div></div>
        Energy <div class="bar-container"><div id="energy-bar"></div></div>
    </div>

    <div id="boss-ui">
        <div style="color: #ff0055; margin-bottom: 5px; font-weight: bold;">BOSS: NEON TITAN</div>
        <div id="boss-bar-box"><div id="boss-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score=0, isGameOver=false, isPaused=false, gameStarted=false, energy=0, isOverloaded=false, overloadTimer=0, chargeTime=0, isCharging=false, boss=null, lastBossThresh=0, lastUpgradeThresh=0;
let bullets=[], enemies=[], particles=[], collectibles=[], powerups=[]; 
let magnetTimer = 0;
const keys={};

const heroes = {
    knight: { speed: 5, maxHp: 100, chargeSpeed: 1.0, color: '#00ffcc', defense: 1 },
    scout: { speed: 7.5, maxHp: 70, chargeSpeed: 1.8, color: '#ffff00', defense: 1 },
    fortress: { speed: 3.5, maxHp: 200, chargeSpeed: 0.6, color: '#0088ff', defense: 0.6 }
};
let player = { x:0, y:0, size:20, angle:0, hp: 100, maxHp: 100, type: 'knight', multiShot: 1 };

// 升級選項池
const upgradePool = [
    { title: "Multi-Shot", desc: "Fire +1 bullet", effect: () => player.multiShot++ },
    { title: "Speed Boost", desc: "Move 15% faster", effect: () => heroes[player.type].speed *= 1.15 },
    { title: "Hyper Charge", desc: "Charge 25% faster", effect: () => heroes[player.type].chargeSpeed *= 1.25 },
    { title: "Repair", desc: "Heal 50% HP", effect: () => player.hp = Math.min(player.hp + player.maxHp*0.5, player.maxHp) },
    { title: "Armor Up", desc: "Reduce 15% Damage", effect: () => heroes[player.type].defense *= 0.85 }
];

function toCharSelect() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('char-select').style.display = 'flex';
}

function selectChar(type) {
    player.type = type;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
    document.getElementById('card-' + type).classList.add('active');
    document.getElementById('confirm-btn').disabled = false;
}

function startGame() {
    document.getElementById('char-select').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    gameStarted = true;
    resize();
    resetGame();
}

function resetGame() {
    const data = heroes[player.type];
    player.hp = data.maxHp; player.maxHp = data.maxHp; player.multiShot = 1;
    score=0; energy=0; lastBossThresh=0; lastUpgradeThresh=0; magnetTimer=0;
    bullets=[]; enemies=[]; particles=[]; collectibles=[]; boss=null; powerups=[];
    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('energy-bar').style.width = energy + "%";
}

// 觸發升級畫面
function checkUpgrade() {
    if (score >= lastUpgradeThresh + 2000) {
        lastUpgradeThresh += 2000;
        showUpgradeScreen();
    }
}

function showUpgradeScreen() {
    isPaused = true;
    const screen = document.getElementById('upgrade-screen');
    const container = document.getElementById('card-options');
    container.innerHTML = "";
    screen.style.display = "flex";

    // 隨機抽 3 張
    const shuffled = [...upgradePool].sort(() => 0.5 - Math.random());
    shuffled.slice(0, 3).forEach(option => {
        const div = document.createElement('div');
        div.className = 'upgrade-card';
        div.innerHTML = `<h3>${option.title}</h3><p>${option.desc}</p>`;
        div.onclick = () => {
            option.effect();
            screen.style.display = "none";
            isPaused = false;
            updateUI();
        };
        container.appendChild(div);
    });
}

function spawnBoss() {
    boss = { x: canvas.width/2, y: -100, size: 100, hp: 150, maxHp: 150, speed: 0.8 };
    document.getElementById('boss-ui').style.display = 'block';
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x));
window.addEventListener('mousedown', e => {
    if(!gameStarted || isPaused) return;
    if(e.button === 0) fireBullet();
    if(e.button === 2) isCharging = true;
});
window.addEventListener('mouseup', e => {
    if(e.button === 2 && isCharging) {
        if(chargeTime > 40 / heroes[player.type].chargeSpeed) releaseNeonRing();
        isCharging = false; chargeTime = 0;
    }
});
window.addEventListener('contextmenu', e => e.preventDefault());

function fireBullet() {
    for(let i=0; i<player.multiShot; i++) {
        let offset = (i - (player.multiShot-1)/2) * 0.1;
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle + offset)*14, vy: Math.sin(player.angle + offset)*14 });
    }
}

function releaseNeonRing() {
    for(let a=0; a<Math.PI*2; a+=0.4) bullets.push({x:player.x, y:player.y, vx:Math.cos(a)*8, vy:Math.sin(a)*8, type:'ring'});
}

function spawnEnemy() {
    if(!gameStarted || isPaused || boss || isGameOver) return;
    const side = Math.floor(Math.random()*4);
    let x = (side%2===0)? Math.random()*canvas.width : (side===1?-30:canvas.width+30);
    let y = (side%2!==0)? Math.random()*canvas.height : (side===0?-30:canvas.height+30);
    enemies.push({x, y, speed: 2 + Math.random()});
}
setInterval(spawnEnemy, 1000);

function update() {
    if(!gameStarted || isPaused || isGameOver) return;
    const hero = heroes[player.type];

    if(keys['w']) player.y -= hero.speed; if(keys['s']) player.y += hero.speed;
    if(keys['a']) player.x -= hero.speed; if(keys['d']) player.x += hero.speed;

    if(isCharging) chargeTime += hero.chargeSpeed;
    if(isOverloaded) {
        if(Date.now() % 5 === 0) fireBullet();
        overloadTimer--;
        if(overloadTimer <= 0) isOverloaded = false;
        document.getElementById('energy-bar').style.width = (overloadTimer/300*100) + "%";
    }

    if(magnetTimer > 0) {
        magnetTimer--;
        document.getElementById('status-msg').style.display = 'block';
        if(magnetTimer <= 0) document.getElementById('status-msg').style.display = 'none';
    }

    for(let i=collectibles.length-1; i>=0; i--) {
        let c = collectibles[i];
        let d = Math.hypot(player.x - c.x, player.y - c.y);
        if(magnetTimer > 0 || d < 30) {
            if (magnetTimer > 0) {
                c.x += (player.x - c.x) * 0.15;
                c.y += (player.y - c.y) * 0.15;
            }
            if (d < 20) {
                energy = Math.min(energy + 8, 100);
                if(energy >= 100 && !isOverloaded) { isOverloaded = true; energy = 0; overloadTimer = 300; }
                collectibles.splice(i, 1);
                updateUI();
            }
        }
    }

    for(let i=powerups.length-1; i>=0; i--) {
        if(Math.hypot(player.x - powerups[i].x, player.y - powerups[i].y) < 30) {
            magnetTimer = 300;
            powerups.splice(i, 1);
        }
    }

    if(boss) {
        let d = Math.hypot(player.x - boss.x, player.y - boss.y);
        boss.x += (player.x - boss.x)/d * boss.speed; boss.y += (player.y - boss.y)/d * boss.speed;
        document.getElementById('boss-bar').style.width = (boss.hp / boss.maxHp * 100) + "%";
        if(d < boss.size/2 + 20) { player.hp -= 1.5 * hero.defense; updateUI(); }
        for(let j=bullets.length-1; j>=0; j--) {
            if(Math.hypot(bullets[j].x - boss.x, bullets[j].y - boss.y) < boss.size/2) {
                if(boss.hp <= 0) break;
                boss.hp--;
                if(bullets[j].type !== 'ring') bullets.splice(j, 1);
                if(boss.hp <= 0) {
                    score += 5000; boss = null;
                    document.getElementById('boss-ui').style.display = 'none';
                    for(let k=0; k<15; k++) collectibles.push({x: player.x + (Math.random()-0.5)*200, y: player.y + (Math.random()-0.5)*200});
                    updateUI(); checkUpgrade(); break;
                }
            }
        }
    }

    for(let i=enemies.length-1; i>=0; i--) {
        let e = enemies[i];
        let d = Math.hypot(player.x-e.x, player.y-e.y);
        e.x += (player.x-e.x)/d * e.speed; e.y += (player.y-e.y)/d * e.speed;
        if(d < 30) { player.hp -= 0.8 * hero.defense; updateUI(); }
        for(let j=bullets.length-1; j>=0; j--) {
            if(Math.hypot(bullets[j].x-e.x, bullets[j].y-e.y) < 25) {
                if(Math.random() > 0.7) collectibles.push({x: e.x, y: e.y});
                if(Math.random() > 0.98) powerups.push({x: e.x, y: e.y});
                enemies.splice(i, 1); 
                if(bullets[j].type !== 'ring') bullets.splice(j, 1);
                score += 100; updateUI();
                checkUpgrade(); // 檢查是否升級
                if(score > 0 && score % 5000 === 0 && !boss && score > lastBossThresh) { lastBossThresh = score; spawnBoss(); }
                break;
            }
        }
    }

    bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i, 1); });
    if(player.hp <= 0) { 
        isGameOver = true; 
        document.getElementById('final-score-val').innerText = score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
}

function drawBackground() {
    ctx.strokeStyle = "rgba(0, 255, 204, 0.1)";
    ctx.lineWidth = 1;
    const gridSize = 50;
    for(let x=0; x<canvas.width; x+=gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
    for(let y=0; y<canvas.height; y+=gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.4)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    if(gameStarted) {
        drawBackground();
        const hero = heroes[player.type];
        powerups.forEach(p => { ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#00ffcc'; collectibles.forEach(c => ctx.fillRect(c.x-4, c.y-4, 8, 8));
        bullets.forEach(b => { ctx.fillStyle = b.type==='ring'?'#00ffcc':'#ffff00'; ctx.beginPath(); ctx.arc(b.x, b.y, b.type==='ring'?6:4, 0, Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#ff4444'; enemies.forEach(e => ctx.fillRect(e.x-12, e.y-12, 24, 24));
        if(boss) { ctx.fillStyle = "#ff0055"; ctx.shadowBlur = 20; ctx.shadowColor = "#ff0055"; ctx.fillRect(boss.x-boss.size/2, boss.y-boss.size/2, boss.size, boss.size); ctx.shadowBlur=0; }
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        ctx.fillStyle = isOverloaded ? '#fff' : hero.color;
        ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-15,-15); ctx.lineTo(-10,0); ctx.lineTo(-15,15); ctx.fill(); ctx.restore();
        if(isCharging) { ctx.beginPath(); ctx.arc(player.x, player.y, Math.min(chargeTime*1.8, 70), 0, Math.PI*2); ctx.strokeStyle = hero.color; ctx.stroke(); }
    }
    requestAnimationFrame(() => { update(); draw(); });
}

function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
