<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; pointer-events: auto; }
        
        #main-menu { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        #main-menu h1 { font-size: 70px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; margin-bottom: 20px; }
        .controls-hint { color: #888888; font-size: 18px; margin-bottom: 40px; }
        .btn-start { padding: 15px 50px; font-size: 24px; background: transparent; border: 3px solid #00ffcc; color: #00ffcc; cursor: pointer; border-radius: 50px; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .btn-start:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; }

        #char-select { background: #000; display: none; }
        .char-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .char-card { border: 2px solid #333; padding: 20px; width: 180px; cursor: pointer; transition: 0.3s; border-radius: 15px; background: rgba(255,255,255,0.05); }
        .char-card:hover, .char-card.active { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; transform: translateY(-5px); }
        
        #upgrade-screen, #pause-menu { background: rgba(0, 0, 0, 0.9); display: none; }
        .card-container { display: flex; gap: 15px; }
        .upgrade-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 2px solid #ffcc00; padding: 25px; width: 220px; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .upgrade-card:hover { transform: scale(1.05); box-shadow: 0 0 20px #ffcc00; }
        
        #game-over-screen { background: #000000; display: none; }
        #game-over-screen h2 { font-size: 60px; color: #ff4444; text-shadow: 0 0 15px #ff4444, 0 0 30px #ff4444; margin-bottom: 20px; }
        #game-over-screen p { font-size: 28px; color: white; margin-bottom: 40px; }
        .btn-go-try { padding: 12px 60px; font-size: 20px; background: transparent; border: 3px solid #00ffcc; color: #00ffcc; cursor: pointer; border-radius: 30px; font-weight: bold; transition: all 0.3s ease; margin: 10px; }
        .btn-go-try:hover { background: #00ffcc; color: #000; }
        .btn-go-exit { padding: 12px 60px; font-size: 20px; background: transparent; border: 3px solid #ff4444; color: #ff4444; cursor: pointer; border-radius: 30px; font-weight: bold; transition: all 0.3s ease; margin: 10px; }
        .btn-go-exit:hover { background: #ff4444; color: #000; }
        
        #game-ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; pointer-events: none; display: none; text-align: left; }
        .bar-container { width: 220px; height: 16px; background: #222; border: 2px solid #444; margin: 5px 0 15px 0; position: relative; overflow: hidden; }
        #hp-ghost { position: absolute; top: 0; left: 0; height: 100%; background: #fff; width: 100%; transition: width 0.6s ease-out; z-index: 1; }
        #hp-bar { position: absolute; top: 0; left: 0; height: 100%; background: #ff4444; width: 100%; z-index: 2; transition: width 0.1s ease-out; }
        #overload-bar { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-1px, -2px); }
            40% { transform: translate(-3px, 0px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(-1px, 2px); }
        }
        .shaking { animation: shake 0.15s infinite; border-color: #ff0000 !important; }

        #boss-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; width: 50%; pointer-events: none; }
        #boss-bar-box { width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff0055; }
        #boss-bar { width: 100%; height: 100%; background: #ff0055; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>NEON SURVIVOR</h1>
        <p class="controls-hint">WASD: Move | Left Click: Shoot | Right Click: Neon Ring (Hold)</p>
        <button class="btn-start" onclick="toCharSelect()">ENTER<br>SYSTEM</button>
    </div>

    <div id="char-select" class="overlay">
        <h2>SELECT YOUR HERO</h2>
        <div class="char-container">
            <div class="char-card" id="card-knight" onclick="selectChar('knight')"><h3>⚔️ Knight</h3><p>Balanced</p></div>
            <div class="char-card" id="card-scout" onclick="selectChar('scout')"><h3>⚡ Scout</h3><p>Fast Charge& Half HP</p></div>
            <div class="char-card" id="card-fortress" onclick="selectChar('fortress')"><h3>🛡️ Fortress</h3><p>Tanky & Double ATK</p></div>
        </div>
        <button class="btn-start" id="confirm-btn" disabled onclick="startGame()" style="font-size: 20px;">CONFIRM & ENTER</button>
    </div>

    <div id="pause-menu" class="overlay">
        <h2 style="color: #00ffcc; font-size: 50px;">PAUSED</h2>
        <button class="btn-go-try" onclick="togglePause()">RESUME (ESC/P)</button>
        <button class="btn-go-exit" onclick="location.reload()">RESTART</button>
    </div>

    <div id="upgrade-screen" class="overlay">
        <h2 style="color: #ffcc00; font-size: 35px; margin-bottom: 30px;">LEVEL UP!</h2>
        <div class="card-container" id="card-options"></div>
    </div>

    <div id="game-over-screen" class="overlay">
        <h2>MISSION FAILED</h2>
        <p>Final Score: <span id="final-score-val">0</span></p>
        <button class="btn-go-try" onclick="location.reload()">TRY AGAIN</button>
        <button class="btn-go-exit" onclick="backToMain()">EXIT TO<br>MENU</button>
    </div>

    <div id="game-ui">
        Score: <span id="score">0</span><br>
        HP 
        <div class="bar-container" id="hp-container">
            <div id="hp-ghost"></div>
            <div id="hp-bar"></div>
        </div>
        OVERLOAD
        <div class="bar-container">
            <div id="overload-bar"></div>
        </div>
    </div>

    <div id="boss-ui">
        <div style="color: #ff0055; margin-bottom: 5px; font-weight: bold;">BOSS: NEON TITAN</div>
        <div id="boss-bar-box"><div id="boss-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score=0, isGameOver=false, isPaused=false, gameStarted=false, energy=0, isOverloaded=false, overloadTimer=0, chargeTime=0, isCharging=false, boss=null, lastBossThresh=0, lastUpgradeThresh=0;
let bullets=[], enemies=[], collectibles=[]; 
const keys={};

let damageFlash = 0; 

// --- [角色數值調整區] ---
const heroes = {
    knight: { speed: 5, maxHp: 100, chargeSpeed: 1.0, color: '#00ffcc', defense: 1, damageMult: 1 },
    // 調整：Scout 血量改為 Knight(100) 的一半 = 50
    scout: { speed: 7.5, maxHp: 50, chargeSpeed: 1.8, color: '#ffff00', defense: 1.2, damageMult: 1 },
    // 調整：Fortress 攻擊傷害倍率設為 2
    fortress: { speed: 3.5, maxHp: 200, chargeSpeed: 0.6, color: '#0088ff', defense: 0.6, damageMult: 2 }
};
let player = { x:0, y:0, size:20, angle:0, hp: 100, maxHp: 100, type: 'knight', multiShot: 1 };

const upgradePool = [
    { title: "Multi-Shot", desc: "+1 Bullet", effect: () => player.multiShot++ },
    { title: "Speed+", desc: "15% Speed", effect: () => heroes[player.type].speed *= 1.15 },
    { title: "Charge+", desc: "25% Charge", effect: () => heroes[player.type].chargeSpeed *= 1.25 },
    { title: "Repair", desc: "Heal 50% HP", effect: () => player.hp = Math.min(player.hp + player.maxHp*0.5, player.maxHp) }
];

function toCharSelect() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('char-select').style.display = 'flex'; }
function selectChar(type) { player.type = type; document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active')); document.getElementById('card-' + type).classList.add('active'); document.getElementById('confirm-btn').disabled = false; }
function startGame() { document.getElementById('char-select').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; gameStarted = true; resize(); resetGame(); }
function backToMain() { location.reload(); }

function resetGame() { 
    const d = heroes[player.type]; 
    player.x = canvas.width / 2; 
    player.y = canvas.height / 2; 
    player.hp = d.maxHp; player.maxHp = d.maxHp; player.multiShot = 1; 
    score=0; energy=0; lastUpgradeThresh=0; lastBossThresh=0; 
    bullets=[]; enemies=[]; collectibles=[]; boss=null; 
    isPaused = false; isGameOver = false;
    updateUI(); 
}

function updateUI() { 
    document.getElementById('score').innerText = score; 
    const hpPercent = Math.max(0, (player.hp / player.maxHp * 100)) + "%";
    document.getElementById('hp-bar').style.width = hpPercent;
    setTimeout(() => { if(document.getElementById('hp-ghost')) document.getElementById('hp-ghost').style.width = hpPercent; }, 250);
    document.getElementById('overload-bar').style.width = energy + "%"; 
}

function triggerDamageFeedback(amt) {
    player.hp -= amt;
    damageFlash = 10;
    const hpContainer = document.getElementById('hp-container');
    hpContainer.classList.add('shaking');
    setTimeout(() => hpContainer.classList.remove('shaking'), 200);
    updateUI();
}

function togglePause() {
    if (!gameStarted || isGameOver || document.getElementById('upgrade-screen').style.display === 'flex') return;
    isPaused = !isPaused;
    document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
}

function showUpgradeScreen() {
    isPaused = true;
    const screen = document.getElementById('upgrade-screen');
    const container = document.getElementById('card-options');
    container.innerHTML = ""; screen.style.display = "flex";
    const shuffled = [...upgradePool].sort(() => 0.5 - Math.random());
    shuffled.slice(0, 3).forEach(option => {
        const div = document.createElement('div'); div.className = 'upgrade-card';
        div.innerHTML = `<h3>${option.title}</h3><p>${option.desc}</p>`;
        div.onclick = () => { option.effect(); screen.style.display = "none"; isPaused = false; updateUI(); };
        container.appendChild(div);
    });
}

function spawnBoss() { 
    boss = { x: canvas.width/2, y: 50, size: 80, hp: 200, maxHp: 200, speed: 1.2 }; 
    document.getElementById('boss-ui').style.display = 'block'; 
}

function drawGrid() {
    ctx.strokeStyle = "rgba(0, 255, 204, 0.1)"; ctx.lineWidth = 1;
    const gridSize = 60;
    ctx.beginPath();
    for(let x=0; x<canvas.width; x+=gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
    for(let y=0; y<canvas.height; y+=gridSize) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
    ctx.stroke();
}

window.addEventListener('keydown', e => { 
    keys[e.key.toLowerCase()] = true; 
    if(e.key === 'Escape' || e.key.toLowerCase() === 'p') togglePause(); 
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x));
window.addEventListener('mousedown', e => { if(!gameStarted || isPaused) return; if(e.button===0) fireBullet(); if(e.button===2) isCharging=true; });
window.addEventListener('mouseup', e => { if(e.button===2 && isCharging) { if(chargeTime > 30 / heroes[player.type].chargeSpeed) releaseNeonRing(); isCharging=false; chargeTime=0; } });
window.addEventListener('contextmenu', e => e.preventDefault());

// --- [發射邏輯更新：帶入傷害倍率] ---
function fireBullet() { 
    const dmg = heroes[player.type].damageMult || 1;
    for(let i=0; i<player.multiShot; i++) { 
        let offset = (i - (player.multiShot-1)/2) * 0.1; 
        bullets.push({ 
            x: player.x, 
            y: player.y, 
            vx: Math.cos(player.angle + offset)*14, 
            vy: Math.sin(player.angle + offset)*14,
            damage: dmg // 子彈帶有傷害屬性
        }); 
    } 
}
function releaseNeonRing() { 
    const dmg = heroes[player.type].damageMult || 1;
    for(let a=0; a<Math.PI*2; a+=0.4) {
        bullets.push({x:player.x, y:player.y, vx:Math.cos(a)*8, vy:Math.sin(a)*8, type:'ring', damage: dmg}); 
    }
}

function spawnEnemy() { 
    if(!gameStarted || isPaused || isGameOver || enemies.length > 60) return; 
    const side = Math.floor(Math.random()*4); 
    let x = (side%2===0)? Math.random()*canvas.width : (side===1?-30:canvas.width+30), y = (side%2!==0)? Math.random()*canvas.height : (side===0?-30:canvas.height+30); 
    enemies.push({x, y, speed: 1.5 + Math.random()}); 
}
setInterval(spawnEnemy, 1000);

function update() {
    if(!gameStarted || isPaused || isGameOver) return; 
    const hero = heroes[player.type];
    if(damageFlash > 0) damageFlash--; 

    if(keys['w']) player.y -= hero.speed; if(keys['s']) player.y += hero.speed; if(keys['a']) player.x -= hero.speed; if(keys['d']) player.x += hero.speed;
    player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
    player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

    if(isCharging) chargeTime += hero.chargeSpeed;
    if(isOverloaded) { if(Date.now() % 5 === 0) fireBullet(); overloadTimer--; if(overloadTimer <= 0) isOverloaded = false; updateUI(); } 
    
    if(boss) {
        let d = Math.hypot(player.x - boss.x, player.y - boss.y);
        if(d > 5) { boss.x += (player.x - boss.x)/d * boss.speed; boss.y += (player.y - boss.y)/d * boss.speed; }
        document.getElementById('boss-bar').style.width = (boss.hp / boss.maxHp * 100) + "%";
        if(d < boss.size/2 + 15) { triggerDamageFeedback(1.0 * hero.defense); }
        for(let j=bullets.length-1; j>=0; j--) {
            if(Math.hypot(bullets[j].x - boss.x, bullets[j].y - boss.y) < boss.size/2) {
                // 修正：依照子彈傷害扣血
                boss.hp -= (bullets[j].damage || 1); 
                if(bullets[j].type!=='ring') bullets.splice(j, 1);
                if(boss.hp <= 0) { 
                    score += 5000; boss = null; document.getElementById('boss-ui').style.display = 'none'; 
                    for(let k=0; k<10; k++) collectibles.push({x: player.x+Math.random()*100-50, y: player.y+Math.random()*100-50});
                    updateUI(); break;
                }
            }
        }
    }

    for(let i=enemies.length-1; i>=0; i--) {
        let e = enemies[i], d = Math.hypot(player.x-e.x, player.y-e.y); 
        if(d > 1) { e.x += (player.x-e.x)/d * e.speed; e.y += (player.y-e.y)/d * e.speed; }
        if(d < 25) { triggerDamageFeedback(0.8 * hero.defense); }
        for(let j=bullets.length-1; j>=0; j--) {
            if(Math.hypot(bullets[j].x-e.x, bullets[j].y-e.y) < 25) {
                if(Math.random() > 0.7) collectibles.push({x: e.x, y: e.y});
                enemies.splice(i, 1); if(bullets[j].type !== 'ring') bullets.splice(j, 1);
                score += 100; updateUI();
                if(score >= lastUpgradeThresh+2000){ lastUpgradeThresh+=2000; showUpgradeScreen(); }
                if(score > 0 && score % 5000 === 0 && !boss && score > lastBossThresh) { lastBossThresh = score; spawnBoss(); } break;
            }
        }
    }

    for(let i=collectibles.length-1; i>=0; i--) { 
        if(Math.hypot(player.x - collectibles[i].x, player.y - collectibles[i].y) < 30) { 
            energy = Math.min(energy + 8, 100); 
            if(energy >= 100 && !isOverloaded){ isOverloaded=true; energy=0; overloadTimer=300; } 
            collectibles.splice(i, 1); 
            updateUI(); 
        } 
    }
    for(let i=bullets.length-1; i>=0; i--) { bullets[i].x += bullets[i].vx; bullets[i].y += bullets[i].vy; if(bullets[i].x<0||bullets[i].x>canvas.width||bullets[i].y<0||bullets[i].y>canvas.height) bullets.splice(i, 1); }
    if(player.hp <= 0) { isGameOver = true; document.getElementById('final-score-val').innerText = score; document.getElementById('game-over-screen').style.display = 'flex'; }
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width,canvas.height);
    if(gameStarted) {
        drawGrid();
        const hero = heroes[player.type];
        ctx.fillStyle = '#00ffcc'; collectibles.forEach(c => ctx.fillRect(c.x-4, c.y-4, 8, 8));
        bullets.forEach(b => { 
            ctx.fillStyle = b.type==='ring'?'#00ffcc':'#ffff00'; 
            ctx.beginPath(); 
            // 視覺增強：坦克子彈變大一點點
            ctx.arc(b.x, b.y, (b.type==='ring'?6:4) * (b.damage > 1 ? 1.5 : 1), 0, Math.PI*2); 
            ctx.fill(); 
        });
        ctx.fillStyle = '#ff4444'; enemies.forEach(e => ctx.fillRect(e.x-10, e.y-10, 20, 20));
        if(boss) { ctx.fillStyle = "#ff0055"; ctx.shadowBlur = 20; ctx.shadowColor = "#ff0055"; ctx.fillRect(boss.x-boss.size/2, boss.y-boss.size/2, boss.size, boss.size); ctx.shadowBlur = 0; }
        
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        ctx.fillStyle = (damageFlash > 0 && damageFlash % 2 === 0) ? '#ff0000' : (isOverloaded ? '#fff' : hero.color);
        ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-15,-15); ctx.lineTo(-10,0); ctx.lineTo(-15,15); ctx.fill(); ctx.restore();
        
        if(isCharging) {
            ctx.beginPath();
            let radius = Math.min(chargeTime * 2.5, 60);
            ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
            ctx.lineWidth = 3;
            ctx.strokeStyle = chargeTime > 30 / hero.chargeSpeed ? '#fff' : hero.color;
            ctx.shadowBlur = 15; ctx.shadowColor = hero.color;
            ctx.stroke();
            ctx.globalAlpha = 0.2; ctx.fillStyle = hero.color; ctx.fill();
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
        }
    }
    requestAnimationFrame(draw);
}

setInterval(update, 1000/60); 
function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize(); draw();
</script>
</body>
</html>
